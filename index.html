<!DOCTYPE html>
<html>
	<head>
		<title>Pill Puzzle</title>

		<style>
			div {outline: 1px solid red;}

			#topContainer
			{
				display: grid;
				grid-template-columns: 1fr 2fr 1fr;
				gap: 20px;
			}

			#middleContainer
			{
				display: grid;
				grid-template-columns: 8fr 1fr;
				gap: 20px;
			}			

			#scaleContainer
			{
			    display: grid;
			    grid-template-rows: 5fr 1fr 1fr;
				gap: 0px;
			}

			#pillsContainer
			{
			    display: grid;
			    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1f;
				gap: 0px;
			}

			.pnlWeighPills
			{
			    display: grid;
			    grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
				gap: 20px;
			}	

			.pill
			{
				font-family: sans-serif;
				font-size: 1em;
				color: rgba(0, 0, 0, 0.8);
				text-align: center;
			}

			.topView
			{

			}

			.sideView
			{
				width: 100px;
				height: 20px;
				outline: 2px solid rgb(200, 200, 200);
				border-radius: 5px;
				background: linear-gradient(90deg, rgb(100, 100, 100), rgb(200, 200, 200), rgb(100, 100, 100));
			}
		</style>

		<script>
			
		</script>
	</head>

	<body>
		<div id="topContainer">
			<div class="pnlWeighPills">
				<div class="pill sideView">1</div>
				<div class="pill sideView">2</div>
				<div class="pill sideView">3</div>
				<div class="pill sideView">4</div>
			</div>

			<div id="scaleContainer">
				<div>&#x2696;</div>
				<div>Times</div>
				<div>Weighbutton</div>
			</div>

			<div class="pnlWeighPills">
				<div class="pill sideView">5</div>
				<div class="pill sideView">6</div>
				<div class="pill sideView">7</div>
				<div class="pill sideView">8</div>
			</div>
		</div>

		<div id="middleContainer">
			<div id="pillsContainer">Pills</div>
			<div>Mouth</div>
		</div>

		<div id="bottomContainer">
			Instructions
			Restart
		</div>
	</body>
</html>
