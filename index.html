<!DOCTYPE html>
<html>
	<head>
		<title>Pill Puzzle</title>

		<style>
			div {outline: 1px solid red;}

			#topContainer
			{
				display: grid;
				grid-template-columns: 1fr 2fr 1fr;
				gap: 20px;
				width: 500px;
				margin: 0 auto 0 auto;
			}

			#middleContainer
			{
				display: grid;
				grid-template-columns: 8fr 1fr;
				gap: 20px;
				width: 500px;
				margin: 0 auto 0 auto;
			}			

			#bottomContainer
			{
				width: 500px;
				margin: 0 auto 0 auto;
			}	

			#scaleContainer
			{
			    display: grid;
			    grid-template-rows: 8fr 1fr 1fr;
				gap: 0px;
			}

			.pnlScale
			{
				text-align: center;
				font-size: 10em;
			}

			#pillsContainer
			{
			    display: grid;
			    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
			}

			.pnlWeighPills
			{
			    display: grid;
			    grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
				gap: 1px;
			}	

			.pill
			{
				font-family: sans-serif;
				font-size: 1em;
				color: rgba(0, 0, 0, 0.8);
				text-align: center;
			}

			.topView
			{
				width: 50px;
				height: 35px;
				outline: 2px solid rgb(200, 200, 200);
				border-radius: 50%;
				background: linear-gradient(45deg, rgb(100, 100, 100), rgb(200, 200, 200));
				text-align: center;
				margin: 0 auto 0 auto;
				padding-top: 15px;
			}

			.sideView
			{
				width: 50px;
				height: 20px;
				outline: 2px solid rgb(200, 200, 200);
				background: linear-gradient(90deg, rgb(100, 100, 100), rgb(200, 200, 200), rgb(100, 100, 100));
				margin: 0 auto 0 auto;
			}

			.bowl 
			{
			    width: 60px;
			    height: 20px;
			    background-color: rgb(0, 0, 0);
			    border-top: none;
			    border-radius: 0 0 10px 10px;
			    margin: 0 auto 0 auto;
			}
		</style>

		<script>
			let pills = 
			{
				gameStatus: false,
				playerStates: {"ill":"&#9785;", "well":"&#9786;", "dead":"&#9760;"},
				pills: [0, 0, 0, 0, 0, 0, 0, 0],
			};
		</script>
	</head>

	<body>
		<div id="topContainer">
			<div class="pnlWeighPills">
				<div></div>
				<div></div>
				<div></div>
				<div></div>
				<div></div>
				<div><div class="pill sideView">1</div></div>
				<div><div class="pill sideView">2</div></div>
				<div><div class="pill sideView">3</div></div>
				<div><div class="pill sideView">4</div></div>
				<div><div class="bowl"></div></div>
			</div>

			<div id="scaleContainer">
				<div class="pnlScale">&#x2696;</div>
				<div>Times</div>
				<div>Weighbutton</div>
			</div>

			<div class="pnlWeighPills">
				<div></div>
				<div></div>
				<div></div>
				<div></div>
				<div></div>
				
				<div><div class="pill sideView">5</div></div>
				<div><div class="pill sideView">6</div></div>
				<div><div class="pill sideView">7</div></div>
				<div><div class="pill sideView">8</div></div>
				<div><div class="bowl"></div></div>
			</div>
		</div>

		<br />

		<div id="middleContainer">
			<div id="pillsContainer">
				<div><div class="pill topView">1</div></div>
				<div><div class="pill topView">2</div></div>
				<div><div class="pill topView">3</div></div>
				<div><div class="pill topView">4</div></div>
				<div><div class="pill topView">5</div></div>
				<div><div class="pill topView">6</div></div>
				<div><div class="pill topView">7</div></div>
				<div><div class="pill topView">8</div></div>
			</div>
			<div>Mouth</div>
		</div>

		<br />

		<div id="bottomContainer">
			Instructions
			Restart
		</div>
	</body>
</html>
